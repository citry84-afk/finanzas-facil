<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter — FinanzasFácil</title>
  <meta name="robots" content="noindex" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 36rem; margin: 3rem auto; padding: 1rem; line-height: 1.6; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <p><strong>Gracias.</strong> Tu alta se ha registrado. Puedes cerrar esta pestaña y volver a la <a href="/">página principal</a>.</p>
  <!-- Misma definición que en index.html: Netlify procesa POST aquí sin pasar por el rewrite del SPA -->
  <form
    name="newsletter"
    method="POST"
    data-netlify="true"
    data-netlify-honeypot="bot-field"
    action="/newsletter.html"
    class="netlify-honeypot-form"
    aria-hidden="true"
  >
    <input type="text" name="bot-field" autocomplete="off" tabindex="-1" />
    <input type="text" name="nombre" />
    <input type="email" name="email" />
    <input type="text" name="fuente" />
  </form>
  <style>
    .netlify-honeypot-form {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
  </style>
</body>
</html>
