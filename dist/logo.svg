<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente naranja a amarillo para el símbolo €+flecha -->
    <linearGradient id="symbolGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="50%" stop-color="#FF8C42" />
      <stop offset="100%" stop-color="#FFD23F" />
    </linearGradient>
    <!-- Sombra para el símbolo -->
    <filter id="symbolShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Brillo metálico para el símbolo -->
    <linearGradient id="symbolShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Fondo circular azul oscuro -->
  <circle cx="100" cy="100" r="100" fill="#1a1f3a"/>

  <!-- Símbolo € + flecha (parte superior) -->
  <g filter="url(#symbolShadow)" transform="translate(100, 60)">
    <!-- Parte izquierda: símbolo € -->
    <path d="M -35,0 
             Q -40,-8 -40,-15
             Q -40,-22 -35,-25
             Q -30,-28 -25,-28
             Q -20,-28 -15,-25
             L -15,-20
             Q -18,-22 -20,-22
             Q -22,-22 -24,-20
             Q -26,-18 -26,-15
             Q -26,-12 -24,-10
             Q -22,-8 -20,-8
             L -10,-8
             L -10,-3
             L -20,-3
             Q -22,-3 -24,-1
             Q -26,1 -26,4
             Q -26,7 -24,9
             Q -22,11 -20,11
             L -15,11
             L -15,16
             Q -20,13 -25,13
             Q -30,13 -35,16
             Q -40,19 -40,26
             Q -40,33 -35,38
             Z" 
          fill="url(#symbolGradient)"/>
    
    <!-- Líneas horizontales del € -->
    <line x1="-30" y1="-12" x2="-20" y2="-12" stroke="url(#symbolGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-30" y1="6" x2="-20" y2="6" stroke="url(#symbolGradient)" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Parte derecha: flecha hacia arriba -->
    <path d="M -15,0
             L -15,-20
             L -5,-20
             L -5,-10
             L 5,-10
             L 5,-20
             L 15,-20
             L 15,0
             L 10,0
             L 10,-15
             L 0,-15
             L 0,-5
             L -10,-5
             L -10,-15
             L -15,-15
             Z" 
          fill="url(#symbolGradient)"/>
    
    <!-- Brillo metálico sobre el símbolo -->
    <path d="M -35,0 
             Q -40,-8 -40,-15
             Q -40,-22 -35,-25
             Q -30,-28 -25,-28
             Q -20,-28 -15,-25
             L -15,0
             L -35,0
             Z" 
          fill="url(#symbolShine)" opacity="0.6"/>
  </g>

  <!-- Texto "FINANZAS MUY FÁCIL" -->
  <text x="100" y="145" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="18" fill="white" letter-spacing="1px">FINANZAS</text>
  <text x="100" y="170" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="16" fill="white" letter-spacing="0.5px">MUY FÁCIL</text>
</svg>
