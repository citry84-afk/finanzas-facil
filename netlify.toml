# Redirigir subdominio Netlify → dominio canonical (evita "alternate with canonical" en Search Console)
# Solo aplica a finanzasmuyfaciles.netlify.app; NO afecta deploy previews (xxx--site.netlify.app)
[[redirects]]
  from = "https://finanzasmuyfaciles.netlify.app/*"
  to = "https://finanzasmuyfacil.com/:splat"
  status = 301
  force = true

# CRÍTICO: Servir ads.txt, app-ads.txt, robots.txt y sitemap.xml ANTES del catch-all
# Sin esto, el catch-all /* envía estas URLs a index.html y AdSense no encuentra ads.txt
[[redirects]]
  from = "/ads.txt"
  to = "/ads.txt"
  status = 200
  force = true
[[redirects]]
  from = "/app-ads.txt"
  to = "/app-ads.txt"
  status = 200
  force = true
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

